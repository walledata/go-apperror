name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install dev tools (gofumpt, govulncheck)
        # golangci-lint is installed by its own action below; these two are
        # small enough to install via `go install` with build-cache reuse.
        run: |
          go install mvdan.cc/gofumpt@v0.7.0
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Verify go.mod / go.sum tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting (gofumpt)
        run: make fmt-check

      - name: Lint (golangci-lint)
        # Uses the upstream action — handles its own caching and is much
        # faster than `go install` for this tool. Action v6+ supports the
        # v2 lint binary directly.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.1
          args: --timeout=5m

      - name: Vulnerability scan (govulncheck)
        run: make vuln

      - name: Tests (race detector)
        run: make test
